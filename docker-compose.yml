version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/usr/share/nginx/html:ro
    networks:
      - portfolio-network
    labels:
      - "com.example.description=Personal Portfolio Application"
      - "com.example.version=1.0"

networks:
  portfolio-network:
    driver: bridge

volumes:
  portfolio-data: